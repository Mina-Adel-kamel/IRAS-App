name: iras_app
description: Incident Response Automation System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── PDF generation & sharing ──────────────────────────────────
  pdf: ^3.12.0
  printing: ^5.14.3

  # ── الملفات والمسارات (تم التحديث لحل التعارض) ──────────────────────
  path_provider: ^2.1.2
  open_filex: ^4.5.0  # ✅ تم تحديثه من 1.3.2 لـ 4.5.0 عشان يشتغل مع النسخ الجديدة

  # ── Charts ───────────────────────────────────────────────────
  fl_chart: ^1.2.0

  # ── URL launcher (SIEM screen) ────────────────────────────────
  url_launcher: ^6.1.11

  # ── HTTP client ───────────────────────────────────────────────
  http: ^1.2.0
  dio: ^5.4.0

  # ── Web download ──────────────────────────────────────────────
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true